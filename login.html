<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessiScan Sign In / Register</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .login-card {
      width: min(520px, 100%);
      background: rgba(255,255,255,0.96);
      color: #1f2937;
      border-radius: 24px;
      padding: 32px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: #f8fafc;
      color: #334155;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
    }

    .tab.active {
      background: #4338ca;
      color: white;
      border-color: #4338ca;
    }

    .login-card h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .login-card p {
      margin-bottom: 24px;
      color: #475569;
    }

    .login-field {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 1rem;
    }

    .login-button {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #4338ca;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .login-button:hover {
      transform: translateY(-1px);
      background: #4f46e5;
    }

    .login-error {
      color: #b91c1c;
      margin-top: 12px;
      font-size: 0.95rem;
    }

    .login-footer {
      margin-top: 24px;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .login-footer a {
      color: #4338ca;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="tabs">
      <div class="tab active" id="loginTab" onclick="showTab('login')">Login</div>
      <div class="tab" id="registerTab" onclick="showTab('register')">Register</div>
    </div>

    <h1 id="formTitle">AccessiScan Sign In</h1>
    <p id="formSubtitle">Sign in to access your account or switch to register as a new user.</p>

    <form id="authForm">
      <input type="text" id="username" class="login-field" placeholder="Username" autocomplete="username" required>
      <input type="password" id="password" class="login-field" placeholder="Password" autocomplete="current-password" required>
      <label style="display: flex; align-items: center; gap: 10px; color: #475569; margin-bottom: 16px;">
        <input type="checkbox" id="rememberMe" style="width: 18px; height: 18px;">
        Remember me for 30 days
      </label>
      <button type="submit" class="login-button" id="submitBtn">Login</button>
      <div id="loginError" class="login-error"></div>
    </form>

    <div class="login-footer">
      <a href="index.html">← Back to AccessiScan</a>
    </div>
  </div>

  <script>
    let currentMode = 'login';

    function showTab(mode) {
      currentMode = mode;
      document.getElementById('loginTab').classList.toggle('active', mode === 'login');
      document.getElementById('registerTab').classList.toggle('active', mode === 'register');
      document.getElementById('formTitle').textContent = mode === 'login' ? 'AccessiScan Sign In' : 'Create a New Account';
      document.getElementById('formSubtitle').textContent = mode === 'login' ? 'Sign in to access your account or switch to register as a new user.' : 'Register a new account and start using AccessiScan immediately.';
      document.getElementById('submitBtn').textContent = mode === 'login' ? 'Login' : 'Register';
      document.getElementById('loginError').textContent = '';
    }

    document.getElementById('authForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      errorEl.textContent = '';

      const url = currentMode === 'login' ? '/api/login' : '/api/register';
      const body = JSON.stringify({ username, password });

      try {
        const response = await fetch(url, {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, remember: document.getElementById('rememberMe').checked })
        });

        const data = await response.json();
        if (!response.ok) {
          errorEl.textContent = data.error || 'Request failed';
          return;
        }

        window.location.href = data.redirect || (currentMode === 'login' ? '/user.html' : '/user.html');
      } catch (err) {
        errorEl.textContent = 'Unable to connect to the server.';
      }
    });
  </script>
</body>
</html>
